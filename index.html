const tagColors = {
  Explorar:{bg:"#1a2a1a",text:"#6abf6a",border:"#2a4a2a"},
  Estilo:  {bg:"#2a1a2a",text:"#c06abf",border:"#4a2a4a"},
  Cuerpo:  {bg:"#1a2a2a",text:"#6abfbf",border:"#2a4a4a"},
  Mente:   {bg:"#2a2a1a",text:"#bfbf6a",border:"#4a4a2a"},
  Social:  {bg:"#2a1a1a",text:"#bf6a6a",border:"#4a2a2a"},
  Crear:   {bg:"#1a1a2a",text:"#6a6abf",border:"#2a2a4a"},
  Comida:  {bg:"#2a1f1a",text:"#bf956a",border:"#4a3a2a"},
  Reto:    {bg:"#2a2218",text:"#d4a840",border:"#4a3a20"},
};

const TAG_ORDER = ['Explorar','Cuerpo','Mente','Social','Crear','Comida','Estilo','Reto'];

let currentIdx = null, done = [], filterTag = null, fading = false;

function getPool() {
  return missions.map((m,i)=>({...m,i})).filter(m=>!done.includes(m.i)&&(filterTag===null||m.t===filterTag));
}

function renderFilters() {
  document.getElementById('filters').innerHTML =
    `<button class="ftag ${filterTag===null?'active':''}" onclick="setFilter(null)">Todas</button>` +
    TAG_ORDER.map(tag=>`<button class="ftag tag-${tag} ${filterTag===tag?'active':''}" onclick="setFilter('${tag}')">${tag}</button>`).join('');
}

function renderCard() {
  const card = document.getElementById('card');
  const btnNew = document.getElementById('btn-new');
  const btnDone = document.getElementById('btn-done');
  const pool = getPool();

  if (currentIdx !== null) {
    const m = missions[currentIdx];
    const c = tagColors[m.t];
    card.style.background = c.bg;
    card.style.borderColor = c.border;
    card.innerHTML = `<div class="c-emoji">${m.e}</div><div class="c-tag" style="color:${c.text}">${m.t}</div><div class="c-text">${m.m}</div>`;
    btnDone.style.display = 'block';
    btnDone.style.borderColor = c.border;
    btnDone.style.color = c.text;
    btnNew.textContent = 'Otra misión';
  } else {
    card.style.background = '#191919';
    card.style.borderColor = '#222';
    card.innerHTML = `<div class="c-empty">${pool.length===0?'¡Has completado todas las misiones! 🎉':'Pulsa el botón para tu primera misión'}</div>`;
    btnDone.style.display = 'none';
    btnNew.textContent = 'Dame una misión';
  }
  btnNew.disabled = pool.length===0 && currentIdx===null;

  const total = missions.filter(m=>filterTag===null||m.t===filterTag).length;
  document.getElementById('count').textContent = done.length>0
    ? `${done.length} completada${done.length>1?'s':''} · ${pool.length} restantes`
    : `${total} misiones disponibles`;
}

function renderDone() {
  const sec = document.getElementById('done-section');
  const list = document.getElementById('done-list');
  if (done.length===0){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML = done.slice().reverse().map(i=>`
    <div class="done-item"><span class="de">${missions[i].e}</span><span class="dt">${missions[i].m}</span></div>`).join('');
}

function newMission() {
  if (fading) return;
  const pool = getPool();
  if (pool.length===0) return;
  fading = true;
  const card = document.getElementById('card');
  card.classList.add('fade');
  setTimeout(()=>{
    const pick = pool[Math.floor(Math.random()*pool.length)];
    currentIdx = pick.i;
    renderCard();
    card.classList.remove('fade');
    fading = false;
  }, 250);
}

function markDone() {
  if (currentIdx===null) return;
  done.push(currentIdx);
  currentIdx = null;
  renderCard();
  renderDone();
}

function setFilter(tag) {
  filterTag = tag;
  currentIdx = null;
  renderFilters();
  renderCard();
}

renderFilters();
renderCard();
renderDone();
</script>
